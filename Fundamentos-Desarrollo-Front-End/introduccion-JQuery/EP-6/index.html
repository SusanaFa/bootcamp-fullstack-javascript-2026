<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <title>JQUERY - L6</title>
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <header class="mb-4">
        <h1 class="text-center">Actividad L6 - jQuery</h1>
        <p class="text-center text-muted">
          Manipulación del DOM y eventos con jQuery
        </p>
      </header>

      <section class="card shadow-sm p-4">
        <h2 class="mb-4">Lista de Tecnologías</h2>

        <!-- Formulario -->
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label for="input" class="form-label"> Tecnología </label>

            <input
              type="text"
              name="input"
              id="input"
              class="form-control"
              placeholder="Escribe una tecnología"
            />
          </div>

          <div class="col-md-auto">
            <button id="agregar" class="btn btn-success">
              Agregar elemento
            </button>
          </div>

          <div class="col-md-auto">
            <button id="ocultarLista" class="btn btn-primary">
              Ocultar lista
            </button>
          </div>
        </div>

        <!-- Lista -->
        <div class="mt-4">
          <ul id="lista" class="list-group">
            <li class="list-group-item">HTML</li>
            <li class="list-group-item">CSS</li>
            <li class="list-group-item">JavaScript</li>
          </ul>
        </div>
      </section>
    </main>

    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- jQuery -->
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>

    <script src="./assets/js/script.js"></script>
  </body>
</html>
