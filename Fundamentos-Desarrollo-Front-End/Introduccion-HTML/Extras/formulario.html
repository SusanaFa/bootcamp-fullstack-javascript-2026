<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario</title>
  </head>
  <body>
    <header>
      <h1>Formulario de inscripción Bootcamp JS</h1>
    </header>

    <main>
      <section>
        <h2>Descripción</h2>
        <p>Completa el siguiente formulario para inscribirte al Bootcamp JS</p>
      </section>

      <section>
        <h2>Formulario de inscripción</h2>
        <form action="#" method="post">
          <div>
            <label for="nombre">Nombre completo:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Introduzca su nombre completo"
              required
            />
          </div>

          <div>
            <label for="correo">Correo electrónico:</label>
            <input type="email" name="correo" id="correo" required />
          </div>

          <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" />
          </div>

          <fieldset>
            <legend>Modalidad:</legend>

            <input type="radio" name="modalidad" id="online" value="online" />
            <label for="online">Online</label>

            <input
              type="radio"
              name="modalidad"
              id="presencial"
              value="presencial"
            />
            <label for="presencial">Presencial</label>

            <input type="radio" name="modalidad" id="hibrido" value="hibrido" />
            <label for="hibrido">Híbrido</label>
          </fieldset>

          <fieldset>
            <legend>Intereses:</legend>
            <input type="checkbox" name="intereses" id="html" value="html" />
            <label for="html">HTML</label>

            <input type="checkbox" name="intereses" id="css" value="css" />
            <label for="css">CSS</label>

            <input type="checkbox" name="intereses" id="js" value="js" />
            <label for="js">JavaScript</label>
          </fieldset>

          <div>
            <label for="region">Región:</label>
            <select name="region" id="region">
              <option value="metropolitana">Metropolitana</option>
              <option value="valparaiso">Valparaiso</option>
              <option value="biobio">Biobio</option>
              <option value="araucania">Araucania</option>
            </select>
          </div>

          <div>
            <button type="submit" value="enviar">Enviar solicitud</button>
            <button type="reset">Resetear</button>
          </div>
        </form>
      </section>
    </main>
    <footer><p>&copy; 2026 Clase 6 - Registro bootcamp JS</p></footer>
  </body>
</html>
