<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- tipografía -->

    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap 5.3.8 -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="./assets/css/styles.css" />

    <title>Ejercicio Bootstrap 2</title>
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Bootstrap 2</a>
        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="bi bi-three-dots-vertical"></span>
        </button>
        <div id="menu" class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="bg-light text-center p-5">
      <div class="container">
        <h1 class="display-3 text-dark">Título Principal</h1>
        <p class="lead">Texto destacado de ejemplo</p>
        <button class="btn btn-info">Acción</button>
      </div>
    </section>

    <!-- GRID -->
    <section class="container my-4">
      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="p-4 border rounded text-center shadow-sm">
            <h3 class="text-danger">Columna 1</h3>
            <p>Contenido</p>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="p-4 border rounded text-center shadow-sm">
            <h3 class="text-primary">Columna 2</h3>
            <p>Contenido</p>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="p-4 border rounded text-center shadow-sm">
            <h3 class="text-success">Columna 3</h3>
            <p>Contenido</p>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="mt-auto bg-dark text-light text-center py-3">
      <small>© 2026 Mi Empresa</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
