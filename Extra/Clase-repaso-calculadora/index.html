<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <div class="calculadora">
      <div id="display">0</div>

      <div class="row">
        <div class="col-6">
          <button class="btn btn-warning botones" onclick="limpia()">C</button>
        </div>
        <div class="col-6">
          <button
            class="btn btn-secondary botones"
            onclick="presionarOperador('/')"
          >
            %
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('7')"
          >
            7
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('8')"
          >
            8
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('9')"
          >
            9
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarOperador('+')"
          >
            +
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('6')"
          >
            6
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('5')"
          >
            5
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('4')"
          >
            4
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarOperador('-')"
          >
            -
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('3')"
          >
            3
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('2')"
          >
            2
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('1')"
          >
            1
          </button>
        </div>
        <div class="col-3">
          <button
            class="btn btn-secondary botones"
            onclick="presionarOperador('*')"
          >
            *
          </button>
        </div>
      </div>

      <div class="row">
        <div class="col-6">
          <button
            class="btn btn-secondary botones"
            onclick="presionarNumero('0')"
          >
            0
          </button>
        </div>
        <div class="col-6">
          <button class="btn btn-secondary botones" onclick="calcular()">
            =
          </button>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
